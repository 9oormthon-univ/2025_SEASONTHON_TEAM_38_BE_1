name: SIMHAE CI/CD

on:
  push:
    branches:
      - develop

jobs:
  build-deploy:
    if: github.repository == 'bum0w0/2025_SEASONTHON_TEAM_38_BE_1' || github.repository == 'YUSEONU/2025_SEASONTHON_TEAM_38_BE_1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      # ... 나머지 steps

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: gradle/gradle-build-action@v3

      - name: Build jar
        run: ./gradlew bootJar -x test

      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .                  # 루트가 컨텍스트 (build/libs가 여기 있음)
          file: Dockerfile
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/simhae-springboot:latest
          push: true

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/2025_SEASONTHON_TEAM_38_BE_1
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            export RDS_ENDPOINT='${{ secrets.RDS_ENDPOINT }}'
            export DB_USERNAME='${{ secrets.DB_USERNAME }}'
            export DB_PASSWORD='${{ secrets.DB_PASSWORD }}'
            docker-compose pull
            docker-compose up -d